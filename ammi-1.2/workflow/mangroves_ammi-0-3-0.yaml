kind: Workflow
metadata:
  generateName: dep-mangroves-
  namespace: argo
spec:
  entrypoint: workflow-entrypoint
  serviceAccountName: public-bucket-writer
  podGC:
    strategy: OnWorkflowSuccess
    deleteDelayDuration: 600s
  parallelism: 200
  podMetadata:
    labels:
      app: dep-mangroves
    annotations:
      karpenter.sh/do-not-disrupt: "true"
  arguments:
    parameters:
      - name: version
        value: "0.3.0" # The version of the data product being made
      - name: image-name
        value: "dep-mangroves-ammi" # The Docker image
      - name: image-tag
        value: "0.3.0-5-gf885f0a" # The Docker image and code version
      - name: bucket
        value: "dep-public-staging" # The bucket to store the data
      - name: regions
        value: "ALL"  # Comma separated list "FJI,TON" or 'ALL'
      - name: years
        value: "2000-2024" # One year "2022", or a period "2020-2021"
  templates:
    - name: workflow-entrypoint
      dag:
        tasks:
          - name: generate-ids
            template: generate
            arguments:
              parameters:
                - name: regions
                  value: "{{ workflow.parameters.regions }}"
                - name: years
                  value: "{{ workflow.parameters.years }}"
                - name: version
                  value: "{{ workflow.parameters.version }}"
                - name: bucket
                  value: "{{ workflow.parameters.bucket }}"

          - name: process-id
            depends: generate-ids.Succeeded
            template: process
            arguments:
              parameters:
                - name: tile-id
                  value: "{{item.tile-id}}"
                - name: year
                  value: "{{item.year}}"
                - name: version
                  value: "{{ workflow.parameters.version }}"
                - name: bucket
                  value: "{{ workflow.parameters.bucket }}"
            withParam: "{{ tasks.generate-ids.outputs.result }}"

    - name: generate
      inputs:
        parameters:
          - name: regions
          - name: years
          - name: version
      container:
        image: "ghcr.io/digitalearthpacific/{{ workflow.parameters.image-name }}:{{ workflow.parameters.image-tag }}"
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 100Mi
            cpu: 1.0
        command: ["uv", "run"]
        args:
          - list.py
          - --regions
          - "{{ inputs.parameters.regions }}"
          - --years
          - "{{ inputs.parameters.years }}"
          - --version
          - "{{ inputs.parameters.version }}"

    - name: process
      retryStrategy:
        limit: "2"
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: tile-id
          - name: year
          - name: version
          - name: bucket
      container:
        image: "ghcr.io/digitalearthpacific/{{ workflow.parameters.image-name }}:{{ workflow.parameters.image-tag }}"
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 8Gi
            cpu: 2
          limits:
            cpu: 4
            memory: 12Gi
        command: ["uv", "run"]
        args:
          - run.py
          - --tile-id
          - "{{ inputs.parameters.tile-id }}"
          - --year
          - "{{ inputs.parameters.year }}"
          - --version
          - "{{ inputs.parameters.version }}"
          - --output-bucket
          - "{{ inputs.parameters.bucket }}"
          - --memory-limit
          - "4Gi"
          - --n-workers
          - "2"
          - --threads-per-worker
          - "16"
          - --no-overwrite
